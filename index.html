<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐶 Puppy Simulator</title>
    <style>
      :root {
        --hud-yellow: #ffd23f;
        --hud-shadow: #3a2410;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; }
      body {
        font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", cursive, sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      canvas { display: block; }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      #title {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 22px;
        color: #fff;
        text-shadow: 2px 2px 0 var(--hud-shadow);
        letter-spacing: 1px;
      }
      #score-box {
        position: absolute;
        top: 14px;
        left: 18px;
        color: var(--hud-yellow);
        text-shadow: 3px 3px 0 var(--hud-shadow);
      }
      #score-label { font-size: 16px; color: #fff; }
      #score { font-size: 44px; line-height: 1; }
      #combo {
        position: absolute;
        top: 96px;
        left: 18px;
        font-size: 26px;
        color: #ff6b6b;
        text-shadow: 2px 2px 0 var(--hud-shadow);
        opacity: 0;
        transition: opacity 0.15s;
      }
      #combo.active { opacity: 1; }
      #combo-bar {
        position: absolute;
        top: 132px;
        left: 18px;
        width: 140px;
        height: 8px;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      #combo-bar.active { opacity: 1; }
      #combo-bar-fill {
        height: 100%;
        width: 100%;
        background: #ff6b6b;
        border-radius: 4px;
      }
      #controls {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        color: #fff;
        text-shadow: 1px 1px 0 var(--hud-shadow);
        background: rgba(0, 0, 0, 0.28);
        padding: 6px 14px;
        border-radius: 10px;
        white-space: nowrap;
      }
      #banner {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5) rotate(-4deg);
        font-size: 54px;
        color: var(--hud-yellow);
        text-shadow: 4px 4px 0 var(--hud-shadow);
        opacity: 0;
        text-align: center;
        white-space: nowrap;
      }
      #banner.show {
        animation: banner-pop 2.4s ease-out forwards;
      }
      @keyframes banner-pop {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(-8deg); }
        12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(2deg); }
        20%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: translate(-50%, -60%) scale(1.05) rotate(-2deg); }
      }
      .popup {
        position: absolute;
        font-size: 24px;
        color: var(--hud-yellow);
        text-shadow: 2px 2px 0 var(--hud-shadow);
        transform: translate(-50%, -50%);
        animation: popup-rise 1.1s ease-out forwards;
        white-space: nowrap;
      }
      @keyframes popup-rise {
        0%   { opacity: 0; margin-top: 0; }
        15%  { opacity: 1; }
        100% { opacity: 0; margin-top: -70px; }
      }
      .popup-zzz {
        font-size: 18px;
        color: #dfe9ff;
        animation-duration: 1.6s;
      }
      .popup-heart {
        font-size: 22px;
        color: #ff7ba6;
        animation-duration: 1.6s;
      }
      .nameplate {
        position: absolute;
        transform: translate(-50%, -100%);
        font-size: 13px;
        color: #fff;
        text-shadow: 1px 1px 0 var(--hud-shadow);
        background: rgba(0, 0, 0, 0.28);
        padding: 1px 9px;
        border-radius: 9px;
        white-space: nowrap;
        pointer-events: none;
      }
      #players {
        position: absolute;
        top: 14px;
        right: 18px;
        font-size: 14px;
        color: #fff;
        text-shadow: 1px 1px 0 var(--hud-shadow);
        background: rgba(0, 0, 0, 0.22);
        border-radius: 10px;
        padding: 6px 12px;
        display: none;
        text-align: right;
      }
      #players .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 5px;
        margin-right: 6px;
      }
      #mp-form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.25);
        padding: 14px 22px;
        border-radius: 14px;
      }
      #mp-form input {
        font-family: inherit;
        font-size: 15px;
        padding: 6px 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        width: 200px;
        text-align: center;
      }
      #colors {
        display: flex;
        gap: 8px;
      }
      .swatch {
        width: 26px;
        height: 26px;
        border-radius: 13px;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
      }
      .swatch.sel {
        border-color: #fff;
      }
      #join {
        font-family: inherit;
        font-size: 16px;
        padding: 7px 20px;
        border: none;
        border-radius: 9px;
        background: var(--hud-yellow);
        color: #3a2410;
        cursor: pointer;
      }
      #mp-status {
        font-size: 13px;
        color: #ffb3b3;
        min-height: 16px;
      }
      #intro {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(20, 30, 15, 0.55);
        color: #fff;
        text-shadow: 2px 2px 0 var(--hud-shadow);
        transition: opacity 0.4s;
        z-index: 10;
      }
      #intro.hidden { opacity: 0; pointer-events: none; }
      #intro h1 { font-size: 56px; color: var(--hud-yellow); text-shadow: 4px 4px 0 var(--hud-shadow); }
      #intro p { font-size: 20px; }
      #intro .hint { font-size: 16px; opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="title">🐶 PUPPY SIMULATOR</div>
      <div id="score-box">
        <div id="score-label">CHAOS</div>
        <div id="score">0</div>
      </div>
      <div id="combo">x1 COMBO</div>
      <div id="combo-bar"><div id="combo-bar-fill"></div></div>
      <div id="banner"></div>
      <div id="players"></div>
      <div id="controls">WASD move &nbsp;·&nbsp; SHIFT zoomies &nbsp;·&nbsp; SPACE jump &nbsp;·&nbsp; <span id="e-hint">E bark</span> &nbsp;·&nbsp; drag mouse to look</div>
    </div>
    <div id="intro">
      <h1>🐶 PUPPY SIMULATOR</h1>
      <p>You are a very good dog. Destroy everything.</p>
      <div id="mp-form">
        <input id="nick" placeholder="nickname" maxlength="14" autocomplete="off" />
        <div id="colors"></div>
        <input id="lobby" placeholder="lobby id (e.g. park)" maxlength="24" autocomplete="off" />
        <button id="join">Join lobby</button>
        <div id="mp-status"></div>
      </div>
      <p class="hint">WASD move · SHIFT zoomies · SPACE jump · E bark · drag mouse to look</p>
      <p class="hint">…or press any key to play solo</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
